<section>
  <h2>{{ text().title }}</h2>
  <div class="about-content">
    <div>
      <div>
        <p>{{ text().lead }}</p>
      </div>
      <div>
        <ul>
          <li>{{ text().stack1 }}</li>
          <li>{{ text().stack2 }}</li>
          <li>{{ text().stack3 }}</li>
        </ul>
      </div>
      <div>
        <button>{{ text().projectsCta }}</button>
        <button>{{ text().contactCta }}</button>
        <button>{{ text().githubCta }}</button>
      </div>
    </div>

    <div class="background-image-left"></div>
    <div class="background-image-right"></div>
    <div class="about">
      <div class="about-card">
        <img src="./assets/icon/about/location.svg" alt="" />
        <p>
          {{ text().cardLocation }}
        </p>
      </div>
      <div class="about-card">
        <img src="./assets/icon/about/puzzle-desktop.svg" alt="" />
        <p>{{ text().cardWorkStyle }}</p>
      </div>
      <div class="about-card">
        <img src="./assets/icon/about/bulb-desktop.svg" alt="" />
        <p>
          {{ text().cardLearning }}
        </p>
      </div>
    </div>
  </div>
</section>
