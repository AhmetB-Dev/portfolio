<section>
  <div class="pf-display">
    <div class="line"></div>
    <div class="descri-pf">
      <h2>{{ text().title }}</h2>
      <p>
        {{ text().lead }}
      </p>
      <div class="portfolio-grid">
        @for (cover of covers; track cover.src) {
          <div class="portfolio-card">
            <img [src]="cover.src" [alt]="cover.name" />
          </div>
        }
      </div>
    </div>
  </div>
</section>
