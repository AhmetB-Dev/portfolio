<header class="site-header">
  <a routerLink="/" fragment="header" class="logo">
    <span class="logo-main">Ahme</span><span class="logo-end">t</span>
  </a>

  <nav>
    <ul>
      <li>
        <a
          routerLink="/"
          fragment="about"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{
            paths: 'exact',
            queryParams: 'ignored',
            matrixParams: 'ignored',
            fragment: 'exact',
          }"
        >
          {{ text().about }}
        </a>
      </li>

      <li>
        <a
          routerLink="/"
          fragment="skills"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{
            paths: 'exact',
            queryParams: 'ignored',
            matrixParams: 'ignored',
            fragment: 'exact',
          }"
        >
          {{ text().skills }}
        </a>
      </li>

      <li>
        <a
          routerLink="/"
          fragment="projects"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{
            paths: 'exact',
            queryParams: 'ignored',
            matrixParams: 'ignored',
            fragment: 'exact',
          }"
        >
          {{ text().portfolio }}
        </a>
      </li>
    </ul>
    <div class="lang-container">
      @for (l of lang.supported; track l.code) {
        <button
          type="button"
          [class.is-active-lang]="lang.current() === l.code"
          (click)="lang.set(l.code)"
        >
          {{ l.short }}
        </button>
      }
    </div>
  </nav>
</header>
