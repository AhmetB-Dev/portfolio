<header class="site-header">
  <a routerLink="/" fragment="hero" class="logo">
    <span class="logo-main">Ahme</span><span class="logo-end">t</span>
  </a>

  <nav>
    <ul>
      <li>
        <a
          routerLink="/"
          fragment="about"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{
            paths: 'exact',
            queryParams: 'ignored',
            matrixParams: 'ignored',
            fragment: 'exact',
          }"
        >
          About me
        </a>
      </li>

      <li>
        <a
          routerLink="/"
          fragment="skills"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{
            paths: 'exact',
            queryParams: 'ignored',
            matrixParams: 'ignored',
            fragment: 'exact',
          }"
        >
          Skills
        </a>
      </li>

      <li>
        <a
          routerLink="/"
          fragment="projects"
          routerLinkActive="is-active"
          [routerLinkActiveOptions]="{
            paths: 'exact',
            queryParams: 'ignored',
            matrixParams: 'ignored',
            fragment: 'exact',
          }"
        >
          Portfolio
        </a>
      </li>
    </ul>
    @for (l of lang.supported; track l.code) {
      <button
        type="button"
        [class.is-active-lang]="lang.current() === l.code"
        (click)="lang.set(l.code)"
      >
        {{ l.short }}
      </button>
    }
  </nav>
</header>
